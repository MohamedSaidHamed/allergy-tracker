<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pollen Map</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1920px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  overflow: hidden; position: relative; background: #e8e0d8;
}
.status-bar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 10;
  height: 80px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 60px; background: rgba(255,255,255,0.92);
}
.time { font-size: 44px; font-weight: 700; color: #111827; }
.status-icons { display: flex; align-items: center; gap: 18px; }

/* MAP BACKGROUND */
.map-bg {
  position: absolute; top: 0; left: 0; right: 0; bottom: 150px;
}

/* HEADER OVERLAY */
.map-header {
  position: absolute; top: 96px; left: 60px; right: 60px; z-index: 10;
  background: rgba(255,255,255,0.96);
  border-radius: 48px; padding: 36px 48px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 8px 40px rgba(0,0,0,0.15);
}
.map-title { font-size: 50px; font-weight: 800; color: #111827; }
.map-sub { font-size: 33px; color: #6b7280; margin-top: 6px; }
.level-badge {
  background: #ffedd5; color: #c2410c;
  font-size: 34px; font-weight: 700;
  padding: 16px 40px; border-radius: 50px;
}

/* HINT TOAST */
.hint-toast {
  position: absolute; top: 270px; left: 50%; transform: translateX(-50%);
  z-index: 10;
  background: rgba(0,0,0,0.55);
  border-radius: 50px; padding: 20px 54px;
  color: #fff; font-size: 34px; white-space: nowrap;
}

/* LEGEND */
.legend {
  position: absolute; bottom: 200px; left: 60px; z-index: 10;
  background: rgba(255,255,255,0.96); border-radius: 36px;
  padding: 30px 42px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
}
.legend-item {
  display: flex; align-items: center; gap: 18px; margin-bottom: 16px;
}
.legend-item:last-child { margin-bottom: 0; }
.leg-dot { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; }
.leg-lbl { font-size: 34px; font-weight: 600; color: #374151; }

/* RE-CENTER BTN */
.recenter {
  position: absolute; bottom: 200px; right: 60px; z-index: 10;
  width: 108px; height: 108px; border-radius: 54px;
  background: #3b82f6;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 24px rgba(59,130,246,0.5);
}

/* PIN CALLOUT */
.callout {
  position: absolute; top: 870px; left: 300px; z-index: 10;
  background: white; border-radius: 30px;
  padding: 28px 40px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.2);
  min-width: 320px;
}
.callout::after {
  content: '';
  position: absolute; bottom: -20px; left: 40px;
  border: 20px solid transparent;
  border-top-color: white; border-bottom: none;
}
.callout-title { font-size: 36px; font-weight: 700; color: #111827; margin-bottom: 8px; }
.callout-row { display: flex; align-items: center; gap: 14px; margin-top: 10px; }
.callout-dot { width: 20px; height: 20px; border-radius: 50%; }
.callout-txt { font-size: 30px; color: #6b7280; }

/* TAB BAR */
.tab-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 150px; background: #fff; border-top: 2px solid #f3f4f6;
  display: flex; align-items: center; justify-content: space-around;
  padding-bottom: 24px; z-index: 20;
}
.tab { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 0 36px; }
.tab svg { width: 54px; height: 54px; }
.tab-lbl { font-size: 28px; font-weight: 500; }
.tab-lbl.on { color: #3b82f6; }
.tab-lbl.off { color: #9ca3af; }
</style>
</head>
<body>

<!-- Status Bar -->
<div class="status-bar">
  <div class="time">9:41</div>
  <div class="status-icons">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="#111827">
      <rect x="1" y="14" width="3" height="7" rx="1"/><rect x="6" y="10" width="3" height="11" rx="1"/>
      <rect x="11" y="6" width="3" height="15" rx="1"/><rect x="16" y="2" width="3" height="19" rx="1"/>
    </svg>
    <svg width="66" height="40" viewBox="0 0 44 24">
      <rect x="0" y="3" width="38" height="18" rx="3" fill="none" stroke="#111827" stroke-width="2"/>
      <rect x="38" y="9" width="4" height="6" rx="1" fill="#111827"/>

<!-- Callout popup -->
